name: CI

# Enforcement gate for code quality and security. Nothing lands in `main`
# without the aggregate "CI Success" check passing (see branch protection).
#
# The backend / frontend / docker jobs each detect whether their part of the
# monorepo has been scaffolded yet and skip gracefully if not. This keeps the
# pipeline green during Phase 1 bootstrap and lights up automatically as the
# backend (ISSUE 1.4), frontend (ISSUE 1.5), and Docker images (ISSUE 1.3) land.
#
# Secrets: ANTHROPIC_API_KEY is injected from GitHub Secrets only, exposed to a
# single step as an env var, and never echoed. No `set -x` is used anywhere.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege. security-events:write is needed to upload SARIF to the
# GitHub Security tab; contents:read is all the jobs otherwise require.
permissions:
  contents: read
  security-events: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------------------
  # Backend — pytest, bandit (SAST), pip-audit (SCA)
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (pytest, bandit, pip-audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Detect backend project
        id: detect
        run: |
          if [ -f backend/requirements.txt ] || [ -f backend/pyproject.toml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No backend Python project yet — skipping backend checks (scaffolded in ISSUE 1.4)."
          fi

      - name: Install dependencies
        if: steps.detect.outputs.present == 'true'
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          if [ -f backend/requirements-dev.txt ]; then pip install -r backend/requirements-dev.txt; fi
          pip install pytest bandit[sarif] pip-audit

      - name: Run pytest
        if: steps.detect.outputs.present == 'true'
        working-directory: backend
        env:
          # Injected from GitHub Secrets only; tests must mock the API. Never logged.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pytest -q

      - name: Bandit (SAST)
        if: steps.detect.outputs.present == 'true'
        id: bandit
        continue-on-error: true
        # Fail only on HIGH severity / HIGH confidence findings (per ISSUE 2.6).
        run: |
          bandit -r backend -f sarif -o bandit.sarif --severity-level high --confidence-level high

      - name: Upload Bandit SARIF
        if: steps.detect.outputs.present == 'true' && hashFiles('bandit.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit.sarif
          category: bandit

      - name: Fail on Bandit HIGH findings
        if: steps.detect.outputs.present == 'true' && steps.bandit.outcome == 'failure'
        run: |
          echo "::error::Bandit reported HIGH severity findings. See the Security tab."
          exit 1

      - name: pip-audit (SCA)
        if: steps.detect.outputs.present == 'true' && hashFiles('backend/requirements.txt') != ''
        run: pip-audit -r backend/requirements.txt --strict

  # ---------------------------------------------------------------------------
  # Frontend — eslint (eslint-plugin-security), npm audit
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (eslint-security, npm audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Detect frontend project
        id: detect
        run: |
          if [ -f frontend/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No frontend project yet — skipping frontend checks (scaffolded in ISSUE 1.5)."
          fi

      - name: Install dependencies
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: ESLint (with eslint-plugin-security)
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        # The `lint` script wires in eslint-plugin-security; configured in ISSUE 1.5.
        run: npm run lint --if-present

      - name: npm audit
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npm audit --audit-level=high

  # ---------------------------------------------------------------------------
  # Docker — build images, trivy scan (no CRITICAL CVEs)
  # ---------------------------------------------------------------------------
  docker:
    name: Docker (build + trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Dockerfiles
        id: detect
        run: |
          present=false
          if [ -f docker/backend.Dockerfile ]; then echo "backend=true" >> "$GITHUB_OUTPUT"; present=true; else echo "backend=false" >> "$GITHUB_OUTPUT"; fi
          if [ -f docker/frontend.Dockerfile ]; then echo "frontend=true" >> "$GITHUB_OUTPUT"; present=true; else echo "frontend=false" >> "$GITHUB_OUTPUT"; fi
          echo "present=$present" >> "$GITHUB_OUTPUT"
          if [ "$present" = "false" ]; then
            echo "::notice::No Dockerfiles yet — skipping image build & scan (scaffolded in ISSUE 1.3)."
          fi

      - name: Build backend image
        if: steps.detect.outputs.backend == 'true'
        run: docker build -t alvf-backend:ci -f docker/backend.Dockerfile .

      - name: Scan backend image (Trivy)
        if: steps.detect.outputs.backend == 'true'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: alvf-backend:ci
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL
          # Scope the SARIF *and* the exit code to CRITICAL only. Without this,
          # the action scans all severities to build the SARIF and exit-code 1
          # then fires on LOW/MED/HIGH too — not just CRITICAL.
          limit-severities-for-sarif: true
          exit-code: "1"
          ignore-unfixed: true

      - name: Build frontend image
        if: steps.detect.outputs.frontend == 'true'
        run: docker build -t alvf-frontend:ci -f docker/frontend.Dockerfile .

      - name: Scan frontend image (Trivy)
        if: steps.detect.outputs.frontend == 'true'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: alvf-frontend:ci
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL
          limit-severities-for-sarif: true
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload backend Trivy SARIF
        if: always() && steps.detect.outputs.backend == 'true' && hashFiles('trivy-backend.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

      - name: Upload frontend Trivy SARIF
        if: always() && steps.detect.outputs.frontend == 'true' && hashFiles('trivy-frontend.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

  # ---------------------------------------------------------------------------
  # Aggregate gate — the single required status check on `main`.
  # ---------------------------------------------------------------------------
  ci-success:
    name: CI Success
    if: always()
    needs: [backend, frontend, docker]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs succeeded
        run: |
          echo "backend:  ${{ needs.backend.result }}"
          echo "frontend: ${{ needs.frontend.result }}"
          echo "docker:   ${{ needs.docker.result }}"
          if [ "${{ needs.backend.result }}" != "success" ] || \
             [ "${{ needs.frontend.result }}" != "success" ] || \
             [ "${{ needs.docker.result }}" != "success" ]; then
            echo "::error::One or more CI jobs failed."
            exit 1
          fi
          echo "All CI jobs passed."
