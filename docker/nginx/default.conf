# nginx config for the frontend container.
# Serves the built SPA and reverse-proxies API calls to the backend service.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Don't leak the nginx version in responses.
    server_tokens off;

    # SPA: fall back to index.html so client-side routes (added in ISSUE 1.5) work.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy: /api/<path> -> backend:8000/<path>
    # (trailing slash on proxy_pass strips the /api/ prefix).
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Allow Server-Sent Events (batch progress streaming, ISSUE 3.2).
        proxy_buffering off;
        proxy_read_timeout 1h;
    }

    # Frontend container liveness probe.
    location = /healthz {
        add_header Content-Type text/plain;
        return 200 'ok';
    }
}
